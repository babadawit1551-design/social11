services:
  # ── Unified Backend ─────────────────────────────────────────────────────────
  - type: web
    name: smas-backend
    runtime: node
    rootDir: .
    buildCommand: npm install && npm run build -w shared && npm run build -w services/auth && npm run build -w services/content && npm run build -w services/schedule && npm run build -w services/analytics && npm run build -w workers/publisher && npm run build -w server
    startCommand: node server/dist/index.js
    envVars:
      - key: DATABASE_URL
        value: postgres://avnadmin:<redacted>@pg-2e7d66da-babadawit1551-aecb.h.aivencloud.com:24648/defaultdb?sslmode=require
      - key: REDIS_URL
        sync: false
      - key: RABBITMQ_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: PORT
        value: "8000"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  # ── Frontend ────────────────────────────────────────────────────────────────
  - type: web
    name: smas-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
